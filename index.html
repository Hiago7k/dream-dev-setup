<!DOCTYPE html>
<html lang="en" ng-app="devSetup">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devSetup</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>

</head>

<body ng-controller="devSetupCtrl">

    <div class="main">
        <div class="canto-esquerdo">

            <!-- <div class="asside-nav-left">
                <div class="left-main">

                    <div class="asside-join">
                        <img src="logo.png" alt="">
                    </div>
                    <h4>Setup hub</h4>
                    <p>Os melhores perifericos para voce</p>
                </div>
            </div> -->

            <div class="slide-bar-top">
                <div class="slide-bar-img "> <img src="logo.png" alt=""></div>
            </div>

        </div>
        <div class="conteudo-meio">
            <h1>Dev Setup</h1>
            <div class="conteudo">

                <thead>
                    <h6>Lista de Perifericos</h6>
                    <input type="text" placeholder="Pesquisar" class="input-group" />
                    <table class="table">
                        <tr>
                            <th></th>
                            <th>Perifericos</th>
                            <th>Preço</th>
                            <th>Link</th>
                        </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="item in items" ng-class="{selecionado: item.selecionado}">
                        <td><input type="checkbox" ng-model="item.selecionado" /></td>
                        <td>{{item.nome}}</td>
                        <td>{{item.preco}}</td>
                        <td>{{item.link}}</td>
                    </tr>
                </tbody>
                </table>
            </div>
        </div>

    </div>

</body>

</html>
