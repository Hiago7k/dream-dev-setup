<!DOCTYPE html>
<html lang="en" ng-app="devSetup">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devSetup</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>

</head>

<body ng-controller="devSetupCtrl">

    <div class="main">
        <div class="canto-esquerdo">
            <p>1</p>
            <p>2</p>
        </div>
        <div class="conteudo-meio">
            <h1>Dev Setup</h1>

            <div class="conteudo">
                <h6>Lista de Perifericos</h6>
                <input type="text" placeholder="Pesquisar" class="input-group">
                <table class="table table-dark" ng-model="tabela" >
                    <thead>
                        <tr></tr>
                        <th>Perifericos</th>
                        <th>Preço</th>
                        <th>Link</th>
                        <tr></tr>
                    </thead>
                    <tbody ng-repeat="item in items">
                        <tr></tr>
                            <td >{{item.nome}}</td>
                            <td>{{item.preco}}</td>
                            <td>{{item.link}}</td>
                        <tr></tr>

                    </tbody>

                </table>
            </div>
        </div>

    </div>
</body>

</html>
